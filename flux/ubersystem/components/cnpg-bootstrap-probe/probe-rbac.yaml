---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: database
  namespace: ${eventname}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cnpg-bootstrap-probe
  namespace: ${eventname}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch", "update"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cnpg-bootstrap-probe
  namespace: ${eventname}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cnpg-bootstrap-probe
subjects:
  - kind: ServiceAccount
    name: database
    namespace: ${eventname}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cnpg-bootstrap-probe-${eventname}
  namespace: flux-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["cnpg-bootstrap-${eventname}"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cnpg-bootstrap-probe-${eventname}
  namespace: flux-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cnpg-bootstrap-probe-${eventname}
subjects:
  - kind: ServiceAccount
    name: database
    namespace: ${eventname}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cnpg-bootstrap-probe-pv
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cnpg-bootstrap-probe-pv-${eventname}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cnpg-bootstrap-probe-pv
subjects:
  - kind: ServiceAccount
    name: database
    namespace: ${eventname}
