---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cnpg-bootstrap-probe-script
  namespace: ${eventname}
data:
  probe.sh: |
    #!/bin/sh
    set -eu
    PREFIX="$EVENT$READ_GEN/database/base/"

    # Look for an old PV previously claimed by ${EVENT}/database-1 that's now
    # Released or Available (the original primary's data, still around because
    # of the storage class Retain policy).
    RELEASED_PV=$(kubectl get pv -o json 2>/dev/null \
      | jq -r --arg ns "$EVENT" '
          .items[]
          | select(.spec.claimRef.namespace == $ns)
          | select(.spec.claimRef.name == "database-1")
          | select(.status.phase == "Released" or .status.phase == "Available")
          | .metadata.name
        ' \
      | head -1)

    PREVIOUS_MODE=$(kubectl -n "$EVENT" get cm cnpg-bootstrap -o jsonpath='{.data.mode}' 2>/dev/null || echo "")

    if [ -n "$${FORCE_MODE:-}" ]; then
      MODE="$FORCE_MODE"
    elif [ "$PREVIOUS_MODE" = "reattach" ] || [ "$PREVIOUS_MODE" = "recovery" ]; then
      # Sticky: never downgrade. Once we've decided to use existing data
      # (either reattached PV or S3 recovery), keep doing so on every probe run.
      MODE="$PREVIOUS_MODE"
    elif [ -n "$RELEASED_PV" ]; then
      MODE=reattach
    elif aws s3 ls "s3://$BUCKET/$PREFIX" 2>/dev/null | grep -q .; then
      MODE=recovery
    else
      MODE=initdb
    fi

    echo "Selected bootstrap mode: $MODE (event=$EVENT, prefix=$PREFIX, released_pv=$RELEASED_PV, previous=$PREVIOUS_MODE)"

    # If reattach: clear claimRef on the old PV and pre-create a labeled PVC
    # so CNPG adopts it (pvcStatus=ready tells CNPG not to re-bootstrap).
    if [ "$MODE" = "reattach" ] && [ -n "$RELEASED_PV" ]; then
      if kubectl -n "$EVENT" get pvc database-1 >/dev/null 2>&1; then
        echo "PVC database-1 already exists; skipping reattach setup"
      else
        PV_SIZE=$(kubectl get pv "$RELEASED_PV" -o jsonpath='{.spec.capacity.storage}')
        PV_SC=$(kubectl get pv "$RELEASED_PV" -o jsonpath='{.spec.storageClassName}')
        echo "Reattaching PV $RELEASED_PV (size=$PV_SIZE, sc=$PV_SC)"
        kubectl patch pv "$RELEASED_PV" --type=json \
          -p='[{"op":"remove","path":"/spec/claimRef"}]'
        cat <<PVC | kubectl apply -f -
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: database-1
      namespace: $EVENT
      labels:
        app.kubernetes.io/component: database
        app.kubernetes.io/managed-by: cloudnative-pg
        app.kubernetes.io/name: postgresql
        cnpg.io/cluster: database
        cnpg.io/instanceName: database-1
        cnpg.io/pvcRole: PG_DATA
      annotations:
        cnpg.io/nodeSerial: "1"
        cnpg.io/pvcStatus: ready
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: $PV_SC
      volumeName: $RELEASED_PV
      resources:
        requests:
          storage: $PV_SIZE
    PVC
      fi
    fi

    # Pick the bootstrap_block to publish. Reattach uses the recovery block
    # too — CNPG won't actually run bootstrap because the PVC is ready, but
    # the spec still needs a valid bootstrap stanza in case the PVC is ever
    # rebuilt from scratch.
    case "$MODE" in
      reattach|recovery) BLOCK=recovery.json ;;
      initdb)            BLOCK=initdb.json ;;
      *)                 BLOCK="$MODE.json" ;;
    esac

    kubectl -n "$EVENT" create configmap cnpg-bootstrap \
      --from-literal=mode="$MODE" \
      --from-file=bootstrap_block=/scripts/$BLOCK \
      --dry-run=client -o yaml | kubectl -n "$EVENT" apply -f -
    kubectl -n flux-system create configmap "cnpg-bootstrap-$EVENT" \
      --from-literal=mode="$MODE" \
      --from-file=bootstrap_block=/scripts/$BLOCK \
      --dry-run=client -o yaml | kubectl -n flux-system apply -f -
  initdb.json: |
    {"initdb": {"database": "app", "owner": "app"}}
  recovery.json: |
    {"recovery": {"source": "primary-cluster-backup", "recoveryTarget": {"targetTLI": "latest"}}}
