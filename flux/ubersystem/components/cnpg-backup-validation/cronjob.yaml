---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cnpg-backup-validation
  namespace: ${eventname}
spec:
  schedule: "${cnpg_backup_validation_schedule:=0 6 * * *}"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: cnpg-backup-validation
          containers:
            - name: validate
              image: alpine/k8s:1.34.0
              command: ["/bin/bash", "/scripts/validate.sh"]
              env:
                - name: EVENT
                  value: "${eventname}"
                - name: PROD_CLUSTER
                  value: "${db_primary:=database}"
                - name: TEST_CLUSTER
                  value: "${cnpg_backup_validation_cluster:=database-backup-test}"
                - name: BUCKET
                  value: "${db_backup_bucket}"
                - name: READ_GEN
                  value: "${cnpg_read_generation}"
                - name: MAX_WAL_AGE
                  value: "${cnpg_backup_validation_max_wal_age:=86400}"
                - name: READY_TIMEOUT
                  value: "${cnpg_backup_validation_ready_timeout:=1800}"
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: scripts
              configMap:
                name: cnpg-backup-validation-script
                defaultMode: 0o755
