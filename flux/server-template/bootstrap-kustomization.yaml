---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ${server}-bootstrap
  namespace: flux-system
spec:
  sourceRef:
    kind: GitRepository
    name: ubersystem-eks
  path: ./flux/ubersystem-bootstrap
  prune: true
  interval: 10m
  dependsOn:
    - name: infrastructure
  postBuild:
    substitute:
      eventname: "${eventname}"
      db_backup_bucket: "${db_backup_bucket}"
      cnpg_read_generation: "${cnpg_read_generation:=}"
      cnpg_force_bootstrap: "${cnpg_force_bootstrap:=}"
