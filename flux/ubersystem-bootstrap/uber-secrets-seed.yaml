---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: uber-secrets-seed
  namespace: ${eventname}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: uber-secrets-seed
  namespace: ${eventname}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: uber-secrets-seed
  namespace: ${eventname}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: uber-secrets-seed
subjects:
  - kind: ServiceAccount
    name: uber-secrets-seed
    namespace: ${eventname}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: uber-secrets-seed-script
  namespace: ${eventname}
data:
  seed.sh: |
    #!/bin/sh
    set -eu
    if kubectl -n "$$NAMESPACE" get secret uber-secrets >/dev/null 2>&1; then
      echo "uber-secrets already exists, skipping"
      exit 0
    fi
    kubectl -n "$$NAMESPACE" create secret generic uber-secrets \
      --from-file=secrets=/scripts/secrets.yaml
    echo "uber-secrets created"
  secrets.yaml: |
    uber:
      secret: {}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: uber-secrets-seed
  namespace: ${eventname}
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: uber-secrets-seed
      containers:
        - name: seed
          image: alpine/k8s:1.34.0
          command: ["/bin/sh", "/scripts/seed.sh"]
          env:
            - name: NAMESPACE
              value: "${eventname}"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: uber-secrets-seed-script
            defaultMode: 0o755
